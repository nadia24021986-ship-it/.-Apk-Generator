```yaml
# .github/workflows/build-apk.yml
name: Build and Email APK

# Menerima trigger eksternal dari Vercel (Repository Dispatch)
on:
  repository_dispatch:
    types: [build_apk]

jobs:
  build:
    name: Proses Perakitan APK
    runs-on: ubuntu-latest

    steps:
      # Langkah 1: Mengunduh semua file dari repositori GitHub Anda
      - name: Checkout Repository
        uses: actions/checkout@v4

      # Langkah 2: Mengonfigurasi lingkungan Java JDK 17 (Wajib untuk kompilasi Android)
      - name: Setup Java JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      # Langkah 3: Mengonfigurasi lingkungan Python untuk menjalankan skrip prep
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      # Langkah 4: Menjalankan skrip Python untuk memproses URL, nama aplikasi, dan ikon kustom
      - name: Siapkan Konfigurasi Android & Logo
        env:
          APP_NAME: ${{ github.event.client_payload.app_name }}
          APP_URL: ${{ github.event.client_payload.url }}
          APP_LOGO: ${{ github.event.client_payload.logo }}
        run: |
          python scripts/build_prep.py

      # Langkah 5: Memberikan izin eksekusi pada Gradle Wrapper dan melakukan perakitan (Build) APK
      - name: Build APK menggunakan Gradle
        working-directory: ./android-template
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug

      # Langkah 6: Mengirimkan file APK hasil build sebagai lampiran ke email pengguna
      - name: Kirim File APK ke Email Pengguna
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ secrets.SMTP_HOST }}
          server_port: 465
          secure: true
          username: ${{ secrets.SMTP_USER }}
          password: ${{ secrets.SMTP_PASSWORD }}
          subject: "Aplikasi APK '${{ github.event.client_payload.app_name }}' Anda Telah Selesai!"
          to: ${{ github.event.client_payload.email }}
          from: "Web-to-APK Auto Generator <${{ secrets.SMTP_USER }}>"
          body: |
            Halo!
            
            Terima kasih telah menggunakan layanan Web-to-APK Generator kami.
            
            Aplikasi Android untuk website berikut telah selesai dirakit:
            - Target URL: ${{ github.event.client_payload.url }}
            - Nama Aplikasi: ${{ github.event.client_payload.app_name }}
            
            File APK versi debug telah kami lampirkan pada email ini dan siap diinstal langsung di ponsel pintar Android Anda.
            
            Catatan Keamanan Android:
            Karena aplikasi ini dibuat secara instan dan tidak diunduh dari Google Play Store, ponsel Anda mungkin menampilkan peringatan "Unknown Source" atau "Blocked by Play Protect". 
            Silakan pilih "Tetap Instal" (Install Anyway) untuk melanjutkan pemasangan aplikasi.
            
            Salam hangat,
            Sistem Otomatisasi APK Anda
          attachments: android-template/app/build/outputs/apk/debug/app-debug.apk

```

